name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Prepare build folder
        run: |
          mkdir -p twa-build
          cp twa-manifest.json twa-build/twa-manifest.json

      - name: Generate signing keystore
        working-directory: twa-build
        run: |
          keytool -genkeypair -v \
            -keystore android.keystore \
            -alias rhf-dragen-key \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -dname "CN=RHF, OU=RHF, O=RHF, L=Unknown, S=Unknown, C=ID"

      - name: Write Bubblewrap global config (skip all interactive prompts)
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF
          cat ~/.bubblewrap/config.json

      - name: Build APK
        working-directory: twa-build
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          bubblewrap build --skipPwaValidation < /dev/null

      - name: List output files (debug)
        if: always()
        working-directory: twa-build
        run: ls -la

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rhf-dragen-apk
          path: twa-build/*.apk
