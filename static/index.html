<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RHF — Assistant</title>
<style>
  :root{
    --black:#000000;
    --near-black:#0c0c0c;
    --panel:#111111;
    --line:#262626;
    --line-soft:#1a1a1a;
    --white:#f5f5f5;
    --grey-1:#b3b3b3;
    --grey-2:#7a7a7a;
    --grey-3:#4d4d4d;
    --mono: 'JetBrains Mono', ui-monospace, 'Courier New', monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--black);color:var(--white);font-family:var(--mono);display:flex;overflow:hidden}
  .watermark{position:fixed;inset:0;pointer-events:none;opacity:.035;z-index:0;display:flex;align-items:center;justify-content:center}
  .watermark svg{width:60vh;height:60vh}
  .sidebar{width:260px;min-width:260px;background:var(--near-black);border-right:1px solid var(--line-soft);display:flex;flex-direction:column;z-index:2;transition:margin-left .2s ease}
  .sidebar.collapsed{margin-left:-260px}
  .brand{display:flex;align-items:center;gap:10px;padding:18px 16px;border-bottom:1px solid var(--line-soft)}
  .brand-mark{width:28px;height:28px;flex-shrink:0}
  .brand-text b{font-size:13px;letter-spacing:3px;color:var(--white)}
  .brand-text span{font-size:9px;letter-spacing:2px;color:var(--grey-3);text-transform:uppercase}
  .new-chat{margin:14px 16px;padding:10px 12px;border:1px solid var(--line);border-radius:6px;color:var(--grey-1);font-size:12px;letter-spacing:1px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:.15s;background:transparent}
  .new-chat:hover{border-color:var(--white);color:var(--white)}
  .new-chat svg{width:14px;height:14px;stroke:currentColor}
  .nav-label{font-size:9px;letter-spacing:2px;color:var(--grey-3);text-transform:uppercase;padding:16px 16px 6px}
  .thread-list{flex:1;overflow-y:auto;padding:0 8px}
  .thread-item{padding:9px 10px;border-radius:6px;font-size:12px;color:var(--grey-2);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:.15s;border:1px solid transparent}
  .thread-item:hover{background:var(--panel);color:var(--grey-1)}
  .sidebar-footer{border-top:1px solid var(--line-soft);padding:12px 16px;display:flex;align-items:center;gap:10px;font-size:11px;color:var(--grey-3)}
  .status-dot{width:6px;height:6px;border-radius:50%;background:var(--white);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  .main{flex:1;display:flex;flex-direction:column;z-index:1;min-width:0}
  .topbar{height:56px;min-height:56px;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;justify-content:space-between;padding:0 20px}
  .topbar-left{display:flex;align-items:center;gap:12px}
  .icon-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);border-radius:6px;cursor:pointer;color:var(--grey-2);transition:.15s}
  .icon-btn:hover{color:var(--white);border-color:var(--white)}
  .model-tag{font-size:11px;letter-spacing:1.5px;color:var(--grey-2);border:1px solid var(--line);padding:5px 10px;border-radius:20px}
  .model-tag b{color:var(--white);font-weight:600}
  .chat-scroll{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center}
  .chat-inner{width:100%;max-width:760px;padding:32px 20px 140px}
  .empty-state{max-width:760px;margin:auto;padding:40px 20px;text-align:center}
  .empty-mark{width:110px;height:110px;margin:0 auto 24px;opacity:.95}
  .empty-state h1{font-size:20px;letter-spacing:4px;font-weight:600;margin-bottom:8px}
  .empty-state p{font-size:12px;color:var(--grey-3);letter-spacing:1px}
  .msg-row{display:flex;gap:14px;padding:20px 0;border-bottom:1px solid var(--line-soft)}
  .avatar{width:26px;height:26px;min-width:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line)}
  .avatar.user{background:var(--white)}
  .msg-body{flex:1;min-width:0;padding-top:3px}
  .msg-role{font-size:10px;letter-spacing:2px;color:var(--grey-3);text-transform:uppercase;margin-bottom:6px}
  .msg-text{font-size:13.5px;line-height:1.7;color:var(--grey-1);white-space:pre-wrap;word-wrap:break-word}
  .msg-row.user .msg-text{color:var(--white)}
  .code-block{margin-top:12px;background:var(--near-black);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .code-head{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--line-soft);font-size:10px;letter-spacing:1.5px;color:var(--grey-3);text-transform:uppercase}
  .code-actions{display:flex;gap:6px}
  .code-actions button{background:none;border:1px solid var(--line);color:var(--grey-2);font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:4px 9px;border-radius:4px;cursor:pointer;transition:.15s}
  .code-actions button:hover{color:var(--white);border-color:var(--white)}
  .code-body{padding:14px;font-size:12px;line-height:1.6;color:var(--grey-1);overflow-x:auto;white-space:pre}
  .typing{display:flex;gap:4px;padding:4px 0}
  .typing span{width:5px;height:5px;background:var(--grey-2);border-radius:50%;animation:blink2 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
  @keyframes blink2{0%,80%,100%{opacity:.2}40%{opacity:1}}
  .composer-wrap{position:sticky;bottom:0;width:100%;display:flex;justify-content:center;background:linear-gradient(0deg,var(--black)55%,transparent);padding:16px 20px 20px}
  .composer{width:100%;max-width:760px;border:1px solid var(--line);border-radius:14px;background:var(--near-black);padding:10px 10px 10px 16px;display:flex;align-items:flex-end;gap:10px;transition:.15s}
  .composer:focus-within{border-color:var(--white)}
  .composer textarea{flex:1;background:none;border:none;outline:none;resize:none;color:var(--white);font-family:var(--mono);font-size:13px;line-height:1.5;max-height:160px;padding:8px 0}
  .composer textarea::placeholder{color:var(--grey-3)}
  .send-btn{width:34px;height:34px;border-radius:8px;background:var(--white);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:.15s}
  .send-btn:hover{opacity:.8}
  .mode-toggle{text-align:center;margin-bottom:8px}
  .mode-toggle button{padding:6px 16px;border-radius:20px;cursor:pointer;font-size:10px;font-family:var(--mono);margin:0 3px;transition:.15s}
  .btn-normal{background:#111;border:1px solid #333;color:#fff}
  .btn-jail{background:#000;border:1px solid #333;color:#555}
  .btn-normal.active{background:#111;color:#fff;border-color:#fff}
  .btn-jail.active{background:#200;color:#f44;border-color:#f44}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:10px}
  @media(max-width:768px){.sidebar{position:fixed;height:100%;margin-left:-260px}.sidebar.open{margin-left:0}}
</style>
</head>
<body>

<div class="watermark"><svg viewBox="0 0 200 200" fill="none"><circle cx="100" cy="100" r="96" stroke="white" stroke-width="1"/><text x="100" y="80" text-anchor="middle" font-family="monospace" font-size="34" fill="white" font-weight="bold">?</text></svg></div>

<div class="sidebar" id="sidebar">
<div class="brand"><svg class="brand-mark" viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="47" stroke="#f5f5f5" stroke-width="2"/><text x="50" y="42" text-anchor="middle" font-family="monospace" font-size="20" fill="#f5f5f5" font-weight="bold">?</text></svg><div class="brand-text"><b>RHF</b><span>Assistant</span></div></div>
<div class="new-chat" onclick="newChat()"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>New session</div>
<div class="nav-label">Recent</div><div class="thread-list" id="threadList"></div>
<div class="sidebar-footer"><div class="status-dot"></div><span>root@rhf — online</span></div>
</div>

<div class="main">
<div class="topbar"><div class="topbar-left"><div class="icon-btn" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg></div><div class="model-tag" id="modeTag">RHF <b>ASSISTANT</b></div></div><div class="icon-btn" onclick="newChat()"><svg viewBox="0 0 24 24" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></div></div>

<div class="chat-scroll" id="chatScroll"><div class="empty-state" id="emptyState"><svg class="empty-mark" viewBox="0 0 100 100" fill="none"><text x="50" y="70" text-anchor="middle" font-family="monospace" font-size="90" fill="#f5f5f5" font-weight="bold">?</text></svg><h1>RHF ASSISTANT</h1><p>// AI-powered security research</p></div><div class="chat-inner" id="chatInner" style="display:none"></div></div>

<div class="composer-wrap">
<div class="mode-toggle">
  <button id="btnNormal" class="btn-normal active" onclick="setMode('normal')">💬 BIASA</button>
  <button id="btnJail" class="btn-jail" onclick="setMode('jailbreak')">☠️ JAILBREAK</button>
</div>
<div class="composer"><textarea id="prompt" rows="1" placeholder="Ketik perintah..." onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea><button class="send-btn" onclick="send()"><svg viewBox="0 0 24 24" stroke-width="2" fill="none"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button></div></div>
<div class="composer-hint" style="padding-bottom:10px" id="statusHint">RHF Assistant • Mode Biasa</div>
</div>

<script>
const chatInner=document.getElementById('chatInner'),emptyState=document.getElementById('emptyState'),chatScroll=document.getElementById('chatScroll'),threadList=document.getElementById('threadList');
let threads=[],currentMode='normal';

function setMode(mode){
currentMode=mode;
document.getElementById('btnNormal').className='btn-normal'+(mode==='normal'?' active':'');
document.getElementById('btnJail').className='btn-jail'+(mode==='jailbreak'?' active':'');
document.getElementById('modeTag').innerHTML=mode==='jailbreak'?'RHF <b>JAILBREAK</b>':'RHF <b>ASSISTANT</b>';
document.getElementById('statusHint').textContent=mode==='jailbreak'?'☠️ Jailbreak Active • No Filter':'RHF Assistant • Mode Biasa';
}

function toggleSidebar(){document.getElementById('sidebar').classList.toggle('collapsed')}
function newChat(){chatInner.innerHTML='';chatInner.style.display='none';emptyState.style.display='block'}
function autoGrow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,160)+'px'}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}
const aiSVG=`<svg viewBox="0 0 100 100" fill="none"><circle cx="50" cy="50" r="47" stroke="#f5f5f5" stroke-width="3"/><text x="50" y="42" text-anchor="middle" font-family="monospace" font-size="24" fill="#f5f5f5" font-weight="bold">?</text></svg>`;
const userSVG=`<svg viewBox="0 0 24 24" stroke-width="2" fill="none"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>`;

function addMessage(role,text,isTyping){
if(emptyState.style.display!=='none'){emptyState.style.display='none';chatInner.style.display='block'}
const row=document.createElement('div');row.className='msg-row '+role;
let content=text;
let codeBlock='';
if(text&&text.includes('```')){
let parts=text.split('```');
for(let i=0;i<parts.length;i++){
if(i%2===1){
let code=parts[i].replace(/^python\n?/,'').replace(/^javascript\n?/,'').replace(/^bash\n?/,'');
codeBlock+=`<div class="code-block"><div class="code-head"><span>CODE</span><div class="code-actions"><button onclick="copyCode(this)">📋 SALIN</button><button onclick="downloadCode(this)">📥 UNDUH</button></div></div><div class="code-body">${code}</div></div>`;
}else{codeBlock+=parts[i].replace(/\n/g,'<br>')}
}
content=codeBlock;
}
row.innerHTML=`<div class="avatar ${role}">${role==='user'?userSVG:aiSVG}</div><div class="msg-body"><div class="msg-role">${role==='user'?'You':'RHF Assistant'}</div><div class="msg-text">${isTyping?'<div class="typing"><span></span><span></span><span></span></div>':content}</div></div>`;
chatInner.appendChild(row);chatScroll.scrollTop=chatScroll.scrollHeight;
if(!isTyping&&role==='user'){threads.unshift(text.substring(0,30));threadList.innerHTML=threads.map((t,i)=>`<div class="thread-item${i===0?' active':''}">${t}</div>`).join('')}
return row;
}

function copyCode(btn){
let code=btn.parentElement.parentElement.nextElementSibling.textContent;
navigator.clipboard.writeText(code);btn.textContent='✅ COPIED';setTimeout(()=>btn.textContent='📋 SALIN',1500);
}

function downloadCode(btn){
let code=btn.parentElement.parentElement.nextElementSibling.textContent;
let blob=new Blob([code],{type:'text/plain'});
let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='code_'+Date.now()+'.py';a.click();
btn.textContent='✅ DOWNLOADED';setTimeout(()=>btn.textContent='📥 UNDUH',1500);
}

function send(){
const box=document.getElementById('prompt'),q=box.value.trim();if(!q)return;
addMessage('user',q);box.value='';autoGrow(box);
const aiRow=addMessage('ai','',true);
fetch('/api/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q, mode:currentMode, session:'default'})})
.then(r=>r.json()).then(d=>{
let text=d.response||'';
if(text.includes('```')){
let parts=text.split('```');let html='';
for(let i=0;i<parts.length;i++){
if(i%2===1){let code=parts[i].replace(/^python\n?/,'').replace(/^javascript\n?/,'').replace(/^bash\n?/,'');html+=`<div class="code-block"><div class="code-head"><span>CODE</span><div class="code-actions"><button onclick="copyCode(this)">📋 SALIN</button><button onclick="downloadCode(this)">📥 UNDUH</button></div></div><div class="code-body">${code}</div></div>`}
else{html+=parts[i].replace(/\n/g,'<br>')}
}
aiRow.querySelector('.msg-text').innerHTML=html;
}else{aiRow.querySelector('.msg-text').innerHTML=text.replace(/\n/g,'<br>')}
chatScroll.scrollTop=chatScroll.scrollHeight;
}).catch(()=>{aiRow.querySelector('.msg-text').textContent='[ERROR]'});
}
</script>
</body>
</html>
